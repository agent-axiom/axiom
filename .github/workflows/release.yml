name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release_preflight:
    name: release preflight / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Check packaged schemas
        run: make check-schemas

      - name: Run unit suite
        run: make test

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify installed wheel
        run: |
          python -m venv .venv-wheel-smoke
          .venv-wheel-smoke/bin/python -m pip install dist/*.whl
          python scripts/installed_wheel_smoke.py \
            --axiom-bin .venv-wheel-smoke/bin/axiom \
            --python-bin .venv-wheel-smoke/bin/python

  publish:
    runs-on: ubuntu-latest
    needs: release_preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Write embedded build metadata
        run: |
          VERSION="${RELEASE_TAG#v}"
          BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RELEASE_COMMIT="$(git rev-parse HEAD)"
          python scripts/write_build_metadata.py \
            --output src/axiom/_build.py \
            --version "$VERSION" \
            --git-commit "$RELEASE_COMMIT" \
            --git-tag "$RELEASE_TAG" \
            --build-timestamp "$BUILD_TIMESTAMP" \
            --source-repo "https://github.com/${GITHUB_REPOSITORY}"

      - name: Check packaged schemas
        run: make check-schemas

      - name: Run unit suite
        run: make test

      - name: Build distributions
        run: python -m build

      - name: Verify installed wheel
        run: |
          python -m venv .venv-wheel-smoke
          .venv-wheel-smoke/bin/python -m pip install dist/*.whl
          python scripts/installed_wheel_smoke.py \
            --axiom-bin .venv-wheel-smoke/bin/axiom \
            --python-bin .venv-wheel-smoke/bin/python

      - name: Generate SHA256 manifest
        run: python scripts/release_manifest.py dist/* > dist/SHA256SUMS

      - name: Generate SPDX SBOM
        run: >
          python scripts/sbom.py
          --package-name axiom-workflow
          --version "${RELEASE_TAG#v}"
          dist/*
          > dist/SBOM.spdx.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/*

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-checksums: dist/SHA256SUMS
          sbom-path: dist/SBOM.spdx.json
