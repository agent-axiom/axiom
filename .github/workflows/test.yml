name: test

on:
  push:
    branches:
      - main
      - codex-release-transparency
  pull_request:

permissions:
  contents: read

jobs:
  unit_matrix:
    name: unit / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check packaged schemas
        run: make check-schemas

      - name: Run unit suite
        run: make test

  unit:
    name: unit
    runs-on: ubuntu-latest
    needs: unit_matrix
    if: ${{ always() }}
    steps:
      - name: Check unit matrix result
        run: test "${{ needs.unit_matrix.result }}" = "success"

  installed_wheel_matrix:
    name: installed-wheel / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Check packaged schemas
        run: make check-schemas

      - name: Build wheel
        run: python -m build --wheel

      - name: Install wheel into clean venv
        run: |
          python -m venv .venv-wheel-smoke
          .venv-wheel-smoke/bin/python -m pip install dist/*.whl

      - name: Run installed CLI smoke
        run: >
          python scripts/installed_wheel_smoke.py
          --axiom-bin .venv-wheel-smoke/bin/axiom
          --python-bin .venv-wheel-smoke/bin/python

  installed-wheel:
    name: installed-wheel
    runs-on: ubuntu-latest
    needs: installed_wheel_matrix
    if: ${{ always() }}
    steps:
      - name: Check installed-wheel matrix result
        run: test "${{ needs.installed_wheel_matrix.result }}" = "success"
