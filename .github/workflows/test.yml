name: test

on:
  push:
    branches:
      - main
      - codex-release-transparency
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit suite
        run: make test
